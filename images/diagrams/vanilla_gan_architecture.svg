<svg width="100%" viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .th { font-family: sans-serif; font-size: 14px; font-weight: 500; fill: #1a1a1a; }
      .ts { font-family: sans-serif; font-size: 12px; fill: #555555; }
    </style>
  </defs>

  <!-- AFM Input -->
  <rect x="20" y="115" width="90" height="50" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text class="th" x="65" y="136" text-anchor="middle" dominant-baseline="central">AFM</text>
  <text class="ts" x="65" y="152" text-anchor="middle" dominant-baseline="central">input</text>

  <line x1="110" y1="140" x2="148" y2="140" stroke="#378ADD" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Generator -->
  <rect x="150" y="85" width="170" height="110" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="235" y="115" text-anchor="middle" dominant-baseline="central">Generator (G)</text>
  <text class="ts" x="235" y="133" text-anchor="middle" dominant-baseline="central">simple conv. network</text>
  <text class="ts" x="235" y="149" text-anchor="middle" dominant-baseline="central">adversarial loss only</text>
  <text class="ts" x="235" y="165" text-anchor="middle" dominant-baseline="central">no L1 constraint</text>

  <line x1="320" y1="140" x2="358" y2="140" stroke="#0F6E56" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Fake O2A -->
  <rect x="360" y="105" width="100" height="50" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="th" x="410" y="126" text-anchor="middle" dominant-baseline="central">Fake O2A</text>
  <text class="ts" x="410" y="142" text-anchor="middle" dominant-baseline="central">generated</text>

  <!-- Real O2A -->
  <rect x="360" y="195" width="100" height="50" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text class="th" x="410" y="216" text-anchor="middle" dominant-baseline="central">Real O2A</text>
  <text class="ts" x="410" y="232" text-anchor="middle" dominant-baseline="central">ground truth</text>

  <line x1="460" y1="130" x2="498" y2="155" stroke="#993C1D" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <line x1="460" y1="220" x2="498" y2="205" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Discriminator -->
  <rect x="500" y="145" width="130" height="60" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="th" x="565" y="168" text-anchor="middle" dominant-baseline="central">Discriminator (D)</text>
  <text class="ts" x="565" y="184" text-anchor="middle" dominant-baseline="central">real vs. fake</text>

  <!-- Loss feedback -->
  <path d="M565 145 Q565 36 235 36 Q235 85 235 85" fill="none" stroke="#993C1D" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text class="ts" x="400" y="28" text-anchor="middle">Adversarial loss only — no pixel-wise constraint</text>
</svg>