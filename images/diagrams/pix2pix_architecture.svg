<svg width="100%" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .th { font-family: sans-serif; font-size: 14px; font-weight: 500; fill: #1a1a1a; }
      .ts { font-family: sans-serif; font-size: 12px; fill: #555555; }
      .arr { stroke: #555; stroke-width: 1.5; fill: none; }
      .c-gray rect { fill: #F1EFE8; stroke: #888780; }
      .c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
      .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
      .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
      .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
    </style>
  </defs>

  <!-- AFM Input -->
  <g class="c-gray">
    <rect x="20" y="130" width="90" height="50" rx="8" stroke-width="0.5"/>
    <text class="th" x="65" y="151" text-anchor="middle" dominant-baseline="central">AFM</text>
    <text class="ts" x="65" y="167" text-anchor="middle" dominant-baseline="central">input image</text>
  </g>

  <line x1="110" y1="155" x2="148" y2="155" stroke="#378ADD" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Generator outer box -->
  <g class="c-blue">
    <rect x="150" y="65" width="210" height="180" rx="8" stroke-width="0.5"/>
    <text class="th" x="255" y="88" text-anchor="middle" dominant-baseline="central">Generator (G)</text>
    <text class="ts" x="255" y="104" text-anchor="middle" dominant-baseline="central">U-Net architecture</text>
  </g>

  <!-- Encoder inside -->
  <g class="c-teal">
    <rect x="165" y="148" width="80" height="40" rx="4" stroke-width="0.5"/>
    <text class="ts" x="205" y="168" text-anchor="middle" dominant-baseline="central">Encoder</text>
  </g>

  <!-- Decoder inside -->
  <g class="c-teal">
    <rect x="265" y="148" width="80" height="40" rx="4" stroke-width="0.5"/>
    <text class="ts" x="305" y="168" text-anchor="middle" dominant-baseline="central">Decoder</text>
  </g>

  <!-- Skip connection -->
  <path d="M205 148 Q205 125 305 125 Q305 148 305 148" fill="none" stroke="#0F6E56" stroke-width="1" stroke-dasharray="3 2"/>
  <text class="ts" x="255" y="54" text-anchor="middle">skip connections</text>
  <line x1="255" y1="57" x2="255" y2="65" stroke="#0F6E56" stroke-width="0.8" stroke-dasharray="2 2" fill="none" marker-end="url(#arrow)"/>

  <line x1="360" y1="155" x2="398" y2="155" stroke="#378ADD" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Generated O2A -->
  <g class="c-purple">
    <rect x="400" y="118" width="110" height="50" rx="8" stroke-width="0.5"/>
    <text class="th" x="455" y="139" text-anchor="middle" dominant-baseline="central">Generated</text>
    <text class="ts" x="455" y="155" text-anchor="middle" dominant-baseline="central">O2A image</text>
  </g>

  <!-- Real O2A -->
  <g class="c-gray">
    <rect x="400" y="210" width="110" height="50" rx="8" stroke-width="0.5"/>
    <text class="th" x="455" y="231" text-anchor="middle" dominant-baseline="central">Real O2A</text>
    <text class="ts" x="455" y="247" text-anchor="middle" dominant-baseline="central">ground truth</text>
  </g>

  <line x1="510" y1="143" x2="538" y2="163" stroke="#7F77DD" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <line x1="510" y1="235" x2="538" y2="220" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Discriminator -->
  <g class="c-coral">
    <rect x="540" y="148" width="120" height="60" rx="8" stroke-width="0.5"/>
    <text class="th" x="600" y="171" text-anchor="middle" dominant-baseline="central">Discriminator (D)</text>
    <text class="ts" x="600" y="187" text-anchor="middle" dominant-baseline="central">PatchGAN</text>
  </g>

  <!-- Loss feedback -->
  <path d="M600 148 Q600 28 255 28 Q255 65 255 65" fill="none" stroke="#993C1D" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text class="ts" x="430" y="22" text-anchor="middle">GAN loss + L1 loss → update G</text>
</svg>