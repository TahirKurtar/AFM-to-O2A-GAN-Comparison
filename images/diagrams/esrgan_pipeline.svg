<svg width="100%" viewBox="0 0 680 230" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .th { font-family: sans-serif; font-size: 14px; font-weight: 500; fill: #1a1a1a; }
      .ts { font-family: sans-serif; font-size: 12px; fill: #555555; }
    </style>
  </defs>

  <!-- Stage labels -->
  <rect x="130" y="18" width="200" height="22" rx="4" fill="none" stroke="#cccccc" stroke-width="0.5" stroke-dasharray="4 2"/>
  <text class="ts" x="230" y="33" text-anchor="middle">Stage 1 — Translation</text>

  <rect x="370" y="18" width="200" height="22" rx="4" fill="none" stroke="#cccccc" stroke-width="0.5" stroke-dasharray="4 2"/>
  <text class="ts" x="470" y="33" text-anchor="middle">Stage 2 — Enhancement</text>

  <!-- AFM Input -->
  <rect x="20" y="88" width="90" height="50" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text class="th" x="65" y="109" text-anchor="middle" dominant-baseline="central">AFM</text>
  <text class="ts" x="65" y="125" text-anchor="middle" dominant-baseline="central">input</text>

  <line x1="110" y1="113" x2="128" y2="113" stroke="#378ADD" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Pix2Pix Generator -->
  <rect x="130" y="65" width="200" height="96" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="230" y="93" text-anchor="middle" dominant-baseline="central">Pix2Pix Generator</text>
  <text class="ts" x="230" y="111" text-anchor="middle" dominant-baseline="central">U-Net + PatchGAN</text>
  <text class="ts" x="230" y="127" text-anchor="middle" dominant-baseline="central">adversarial + L1 loss</text>
  <text class="ts" x="230" y="143" text-anchor="middle" dominant-baseline="central">initial O2A output</text>

  <line x1="330" y1="113" x2="368" y2="113" stroke="#0F6E56" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- ESRGAN -->
  <rect x="370" y="65" width="200" height="96" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="470" y="93" text-anchor="middle" dominant-baseline="central">ESRGAN</text>
  <text class="ts" x="470" y="111" text-anchor="middle" dominant-baseline="central">RRDB blocks</text>
  <text class="ts" x="470" y="127" text-anchor="middle" dominant-baseline="central">perceptual sharpening</text>
  <text class="ts" x="470" y="143" text-anchor="middle" dominant-baseline="central">noise suppression</text>

  <line x1="570" y1="113" x2="608" y2="113" stroke="#534AB7" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Final Output -->
  <rect x="610" y="88" width="60" height="50" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="640" y="109" text-anchor="middle" dominant-baseline="central">O2A</text>
  <text class="ts" x="640" y="125" text-anchor="middle" dominant-baseline="central">refined</text>

  <!-- Note -->
  <rect x="160" y="178" width="360" height="24" rx="6" fill="none" stroke="#cccccc" stroke-width="0.5"/>
  <text class="ts" x="340" y="194" text-anchor="middle">ESRGAN enhances sharpness — does not retrain the base model</text>
</svg>