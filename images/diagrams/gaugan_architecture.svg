<svg width="100%" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .th { font-family: sans-serif; font-size: 14px; font-weight: 500; fill: #1a1a1a; }
      .ts { font-family: sans-serif; font-size: 12px; fill: #555555; }
    </style>
  </defs>

  <!-- AFM Input -->
  <rect x="20" y="50" width="100" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="70" y="68" text-anchor="middle" dominant-baseline="central">AFM input</text>
  <text class="ts" x="70" y="84" text-anchor="middle" dominant-baseline="central">structural map</text>

  <!-- Encoder -->
  <rect x="20" y="155" width="100" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text class="th" x="70" y="173" text-anchor="middle" dominant-baseline="central">Encoder</text>
  <text class="ts" x="70" y="189" text-anchor="middle" dominant-baseline="central">Mu / LogVar</text>

  <!-- Latent z -->
  <rect x="20" y="255" width="100" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text class="th" x="70" y="273" text-anchor="middle" dominant-baseline="central">Latent z</text>
  <text class="ts" x="70" y="289" text-anchor="middle" dominant-baseline="central">reparameterize</text>

  <line x1="70" y1="94" x2="70" y2="153" stroke="#185FA5" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <line x1="70" y1="199" x2="70" y2="253" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- SPADE Generator -->
  <rect x="160" y="30" width="300" height="290" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="310" y="56" text-anchor="middle" dominant-baseline="central">SPADE Generator</text>

  <!-- SPADE ResBlock 1 -->
  <rect x="180" y="75" width="260" height="50" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="310" y="95" text-anchor="middle" dominant-baseline="central">SPADE ResBlock 1</text>
  <text class="ts" x="310" y="113" text-anchor="middle" dominant-baseline="central">γ, β modulated by AFM map</text>

  <!-- SPADE ResBlock 2 -->
  <rect x="180" y="155" width="260" height="50" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="310" y="175" text-anchor="middle" dominant-baseline="central">SPADE ResBlock 2</text>
  <text class="ts" x="310" y="193" text-anchor="middle" dominant-baseline="central">γ, β modulated by AFM map</text>

  <!-- SPADE ResBlock 3 -->
  <rect x="180" y="235" width="260" height="50" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="310" y="255" text-anchor="middle" dominant-baseline="central">SPADE ResBlock 3</text>
  <text class="ts" x="310" y="273" text-anchor="middle" dominant-baseline="central">γ, β modulated by AFM map</text>

  <!-- AFM injected at each layer -->
  <line x1="120" y1="72" x2="178" y2="100" stroke="#185FA5" stroke-width="1" stroke-dasharray="3 2" fill="none" marker-end="url(#arrow)"/>
  <line x1="120" y1="72" x2="178" y2="180" stroke="#185FA5" stroke-width="1" stroke-dasharray="3 2" fill="none" marker-end="url(#arrow)"/>
  <line x1="120" y1="72" x2="178" y2="260" stroke="#185FA5" stroke-width="1" stroke-dasharray="3 2" fill="none" marker-end="url(#arrow)"/>
  <text class="ts" x="148" y="168" text-anchor="middle">spatial</text>
  <text class="ts" x="148" y="182" text-anchor="middle">injection</text>

  <line x1="120" y1="277" x2="178" y2="260" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <line x1="460" y1="175" x2="498" y2="175" stroke="#0F6E56" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Generated O2A -->
  <rect x="500" y="130" width="110" height="50" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="555" y="150" text-anchor="middle" dominant-baseline="central">Generated</text>
  <text class="ts" x="555" y="166" text-anchor="middle" dominant-baseline="central">O2A image</text>

  <!-- Discriminator -->
  <rect x="500" y="230" width="110" height="50" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="th" x="555" y="248" text-anchor="middle" dominant-baseline="central">Discriminator</text>
  <text class="ts" x="555" y="264" text-anchor="middle" dominant-baseline="central">multi-scale</text>

  <line x1="555" y1="180" x2="555" y2="228" stroke="#993C1D" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Note -->
  <rect x="150" y="332" width="380" height="24" rx="6" fill="none" stroke="#cccccc" stroke-width="0.5"/>
  <text class="ts" x="340" y="348" text-anchor="middle">AFM map injected at every SPADE layer — not only at input</text>
</svg>