<svg width="100%" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .th { font-family: sans-serif; font-size: 14px; font-weight: 500; fill: #1a1a1a; }
      .ts { font-family: sans-serif; font-size: 12px; fill: #555555; }
    </style>
  </defs>

  <rect x="20" y="30" width="220" height="280" rx="12" fill="#E6F1FB" stroke="#B5D4F4" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="12" x="130" y="50" text-anchor="middle" fill="#0C447C">Domain A (AFM)</text>

  <rect x="440" y="30" width="220" height="280" rx="12" fill="#EEEDFE" stroke="#CECBF6" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="12" x="550" y="50" text-anchor="middle" fill="#3C3489">Domain B (O2A)</text>

  <!-- Real A -->
  <rect x="40" y="70" width="100" height="44" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="90" y="88" text-anchor="middle" dominant-baseline="central">Real A</text>
  <text class="ts" x="90" y="104" text-anchor="middle" dominant-baseline="central">AFM image</text>

  <!-- Rec. A -->
  <rect x="40" y="220" width="100" height="44" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="90" y="238" text-anchor="middle" dominant-baseline="central">Rec. A</text>
  <text class="ts" x="90" y="254" text-anchor="middle" dominant-baseline="central">F(G(x))</text>

  <!-- Real B -->
  <rect x="540" y="220" width="100" height="44" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="590" y="238" text-anchor="middle" dominant-baseline="central">Real B</text>
  <text class="ts" x="590" y="254" text-anchor="middle" dominant-baseline="central">O2A image</text>

  <!-- Fake B -->
  <rect x="540" y="70" width="100" height="44" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="590" y="88" text-anchor="middle" dominant-baseline="central">Fake B</text>
  <text class="ts" x="590" y="104" text-anchor="middle" dominant-baseline="central">G(x)</text>

  <!-- G -->
  <rect x="295" y="60" width="90" height="64" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="340" y="85" text-anchor="middle" dominant-baseline="central">G</text>
  <text class="ts" x="340" y="105" text-anchor="middle" dominant-baseline="central">AFM → O2A</text>

  <!-- F -->
  <rect x="295" y="215" width="90" height="64" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="340" y="240" text-anchor="middle" dominant-baseline="central">F</text>
  <text class="ts" x="340" y="260" text-anchor="middle" dominant-baseline="central">O2A → AFM</text>

  <!-- D_B -->
  <rect x="460" y="135" width="80" height="50" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="th" x="500" y="155" text-anchor="middle" dominant-baseline="central">D_B</text>
  <text class="ts" x="500" y="171" text-anchor="middle" dominant-baseline="central">discriminator</text>

  <!-- D_A -->
  <rect x="140" y="135" width="80" height="50" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="th" x="180" y="155" text-anchor="middle" dominant-baseline="central">D_A</text>
  <text class="ts" x="180" y="171" text-anchor="middle" dominant-baseline="central">discriminator</text>

  <!-- Arrows -->
  <line x1="140" y1="92" x2="293" y2="92" stroke="#185FA5" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <line x1="385" y1="92" x2="538" y2="92" stroke="#0F6E56" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <line x1="540" y1="114" x2="520" y2="135" stroke="#993C1D" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <line x1="540" y1="242" x2="520" y2="185" stroke="#534AB7" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M540 114 Q387 114 387 230" fill="none" stroke="#993C1D" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arrow)"/>
  <line x1="295" y1="247" x2="142" y2="242" stroke="#854F0B" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <line x1="140" y1="114" x2="178" y2="135" stroke="#185FA5" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <line x1="140" y1="220" x2="178" y2="185" stroke="#854F0B" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <text font-family="sans-serif" font-size="12" x="70" y="320" text-anchor="middle" fill="#BA7517">Cycle-consistency loss</text>
  <text font-family="sans-serif" font-size="12" x="590" y="320" text-anchor="middle" fill="#BA7517">Adversarial loss</text>
</svg>